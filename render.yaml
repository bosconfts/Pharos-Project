services:
  - type: web
    name: pharos-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: BLOCKFROST_PROJECT_ID
        sync: false
      - key: BLOCKFROST_BASE_URL
        value: https://cardano-mainnet.blockfrost.io/api/v0
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
